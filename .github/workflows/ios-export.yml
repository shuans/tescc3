name: Cocos Creator 3.8.8 iOS Export

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        type: boolean
        default: false

env:
  COCOS_DOWNLOAD_URL: "https://download.cocos.org/CocosCreator/v3.8.8/CocosCreator-v3.8.8-mac-010512.zip"
  TEMPLATE_REPO: "https://github.com/cocos/cocos-template-hello-world.git"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-export:
    name: "iOS Export + XCFramework (Cocos 3.8.8)"
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Cocos Creator
        id: cache-cocos
        uses: actions/cache@v4
        with:
          path: ~/CocosCreator.app
          key: cocos-creator-3-8-8-${{ runner.os }}

      - name: Download & Install Cocos Creator 3.8.8
        if: steps.cache-cocos.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          COCOS_ZIP="/tmp/CocosCreator-3.8.8.zip"
          COCOS_EXTRACT="/tmp/CocosCreatorExtracted"
          COCOS_APP="$HOME/CocosCreator.app"

          if [ -d "$COCOS_APP" ]; then
            echo "Cocos Creator already exists"
            exit 0
          fi

          curl -L -o "$COCOS_ZIP" "${{ env.COCOS_DOWNLOAD_URL }}" \
            --retry 3 --retry-delay 5 --connect-timeout 30 --progress-bar

          test -s "$COCOS_ZIP"
          mkdir -p "$COCOS_EXTRACT"
          unzip -q "$COCOS_ZIP" -d "$COCOS_EXTRACT"
          cp -R "$COCOS_EXTRACT/CocosCreator.app" "$HOME/"

          test -x "$COCOS_APP/Contents/MacOS/CocosCreator"
          rm -rf "$COCOS_ZIP" "$COCOS_EXTRACT"

      - name: Verify Installation
        run: |
          set -euo pipefail
          COCOS_BIN="$HOME/CocosCreator.app/Contents/MacOS/CocosCreator"
          test -x "$COCOS_BIN"
          xcodebuild -version

      - name: Initialize Hello World Example Project
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ github.workspace }}/CocosExample"

          git clone --depth 1 "${{ env.TEMPLATE_REPO }}" "$PROJECT_DIR"
          rm -rf "$PROJECT_DIR/.git"

          PKG_JSON="$PROJECT_DIR/package.json"
          if [ -f "$PKG_JSON" ]; then
            python3 -c "import json; p='$PKG_JSON'; d=json.load(open(p)); d['version']='3.8.8'; json.dump(d, open(p,'w'), indent=2)"
          fi

      - name: Build for iOS
        id: build-ios
        run: |
          set -euo pipefail
          COCOS_BIN="$HOME/CocosCreator.app/Contents/MacOS/CocosCreator"
          PROJECT_DIR="${{ github.workspace }}/CocosExample"

          SCENE_META=$(find "$PROJECT_DIR/assets" -maxdepth 3 -name "*.scene.meta" | head -1)
          if [ -z "$SCENE_META" ]; then
            echo "No scene found"
            exit 1
          fi

          SCENE_UUID=$(python3 -c "import json; print(json.load(open('$SCENE_META'))['uuid'])")

          BUILD_CFG="${{ github.workspace }}/build-config.json"
          python3 -c "import json; cfg={'platform':'ios','buildPath':'${{ github.workspace }}/build','startScene':'$SCENE_UUID','scenes':[{'uuid':'$SCENE_UUID'}],'useDebug':False,'packages':{'ios':{'packageName':'com.cocos.example.ios'}}}; json.dump(cfg, open('$BUILD_CFG','w'), indent=2)"

          BUILD_ARGS="configPath=$BUILD_CFG"
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            BUILD_ARGS="${BUILD_ARGS};debug=true"
          fi

          BUILD_EXIT_CODE=0
          "$COCOS_BIN" --project "$PROJECT_DIR" --build "$BUILD_ARGS" 2>&1 || BUILD_EXIT_CODE=$?

          echo "exit_code=$BUILD_EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ "$BUILD_EXIT_CODE" -eq 32 ] || [ "$BUILD_EXIT_CODE" -eq 34 ]; then
            exit "$BUILD_EXIT_CODE"
          fi

      - name: Build Static Library + Create XCFramework
        run: |
          set -euo pipefail
          IOS_BUILD_DIR="${{ github.workspace }}/build/ios"
          PROJ_DIR="$IOS_BUILD_DIR/proj"
          XC_OUT="$IOS_BUILD_DIR/CocosEngine.xcframework"
          TMP_HEADERS="$RUNNER_TEMP/cocos-xc-headers"
          BUILD_ROOT="$RUNNER_TEMP/cocos-lib-build"
          LOG_DIR="$RUNNER_TEMP/cocos-xc-logs"
          mkdir -p "$TMP_HEADERS"
          mkdir -p "$LOG_DIR"

          # Prefer an existing xcframework generated by Cocos/engine scripts.
          EXISTING_XC=$(find "$IOS_BUILD_DIR" -name "*.xcframework" | head -1 || true)
          if [ -n "${EXISTING_XC:-}" ]; then
            rm -rf "$XC_OUT"
            cp -R "$EXISTING_XC" "$XC_OUT"
            echo "Reused existing xcframework: $EXISTING_XC"
            exit 0
          fi

          XCODEPROJ=$(find "$PROJ_DIR" -maxdepth 2 -name "*.xcodeproj" | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "Xcode project not found"
            exit 0
          fi

          xcodebuild -list -project "$XCODEPROJ" > "$LOG_DIR/project-list.txt" 2>&1 || true
          xcodebuild -list -json -project "$XCODEPROJ" > "$LOG_DIR/project-list.json" 2>&1 || true

          TARGETS=""
          if python3 -c "import json,sys; p=sys.argv[1]; d=json.load(open(p)); [print(t) for t in d.get('project',{}).get('targets',[]) if t]" "$LOG_DIR/project-list.json" > "$LOG_DIR/targets.txt" 2>/dev/null
          then
            TARGETS=$(cat "$LOG_DIR/targets.txt" || true)
          fi

          if [ -z "${TARGETS:-}" ]; then
            TARGETS=$(awk '
              /^Targets:/{flag=1;next}
              /^Build Configurations:/{flag=0}
              flag && NF{print}
            ' "$LOG_DIR/project-list.txt" | sed 's/^[[:space:]]*//' || true)
          fi

          if [ -z "${TARGETS:-}" ]; then
            echo "No targets parsed from xcodebuild -list output, skip xcframework packaging."
            exit 0
          fi

          PICKED_TARGET=""
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            lower=$(echo "$t" | tr '[:upper:]' '[:lower:]')
            if echo "$lower" | grep -Eq 'test|tests'; then
              continue
            fi

            echo "Trying target: $t"
            if xcodebuild \
              -project "$XCODEPROJ" \
              -target "$t" \
              -configuration Release \
              -sdk iphoneos \
              BUILD_DIR="$BUILD_ROOT/iphoneos" \
              BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
              IPHONEOS_DEPLOYMENT_TARGET=14.5 \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGNING_ALLOWED=NO \
              build > "$LOG_DIR/build-${t// /_}-iphoneos.log" 2>&1; then
              if xcodebuild \
                -project "$XCODEPROJ" \
                -target "$t" \
                -configuration Release \
                -sdk iphonesimulator \
                BUILD_DIR="$BUILD_ROOT/iphonesimulator" \
                BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
                IPHONEOS_DEPLOYMENT_TARGET=14.5 \
                ONLY_ACTIVE_ARCH=NO \
                CODE_SIGNING_ALLOWED=NO \
                build > "$LOG_DIR/build-${t// /_}-iphonesimulator.log" 2>&1; then
                PICKED_TARGET="$t"
                break
              fi
            fi
          done <<< "$TARGETS"

          if [ -z "$PICKED_TARGET" ]; then
            echo "No buildable static-library style target found, skip xcframework packaging."
            exit 0
          fi

          DEVICE_A_DIR="$BUILD_ROOT/iphoneos/Release-iphoneos"
          SIM_A_DIR="$BUILD_ROOT/iphonesimulator/Release-iphonesimulator"
          DEVICE_A=$(find "$DEVICE_A_DIR" -name "*.a" | head -1 || true)
          if [ -z "${DEVICE_A:-}" ]; then
            echo "No device static library generated for target: $PICKED_TARGET"
            exit 0
          fi

          LIB_NAME=$(basename "$DEVICE_A")
          SIM_A=$(find "$SIM_A_DIR" -name "$LIB_NAME" | head -1 || true)
          if [ -z "${SIM_A:-}" ]; then
            SIM_A=$(find "$SIM_A_DIR" -name "*.a" | head -1 || true)
          fi

          if [ -n "${SIM_A:-}" ]; then
            rm -rf "$XC_OUT"
            xcodebuild -create-xcframework \
              -library "$DEVICE_A" -headers "$TMP_HEADERS" \
              -library "$SIM_A" -headers "$TMP_HEADERS" \
              -output "$XC_OUT"
            echo "Created xcframework from target: $PICKED_TARGET"
          else
            echo "No simulator static library found to pair with $LIB_NAME, skip xcframework packaging."
          fi

      - name: Package Runtime Assets
        run: |
          set -euo pipefail
          OUT_DIR="${{ github.workspace }}/build/cocos-runtime"
          mkdir -p "$OUT_DIR"

          for d in assets src jsb-adapter; do
            if [ -d "${{ github.workspace }}/build/$d" ]; then
              cp -R "${{ github.workspace }}/build/$d" "$OUT_DIR/"
            fi
          done

          if [ -d "${{ github.workspace }}/build/ios/CocosEngine.xcframework" ]; then
            cp -R "${{ github.workspace }}/build/ios/CocosEngine.xcframework" "$OUT_DIR/"
          else
            echo "CocosEngine.xcframework not found, assets-only package will be uploaded."
          fi

      - name: Inspect Build Output
        if: always()
        run: |
          BUILD_DIR="${{ github.workspace }}/build"
          if [ -d "$BUILD_DIR" ]; then
            find "$BUILD_DIR" -maxdepth 4 | sort
          else
            echo "build directory not found"
          fi

      - name: Upload iOS Runtime SDK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cocos-ios-runtime-sdk
          path: |
            build/cocos-runtime/
            build/ios/proj/
          if-no-files-found: warn
          compression-level: 6
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/.CocosCreator/logs/**
            ~/Library/Logs/CocosCreator/**
            ${{ runner.temp }}/cocos-xc-logs/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo "## iOS Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cocos Creator: 3.8.8" >> "$GITHUB_STEP_SUMMARY"
          echo "- Output artifact: cocos-ios-runtime-sdk" >> "$GITHUB_STEP_SUMMARY"
          echo "- Includes: CocosEngine.xcframework + assets/src/jsb-adapter + iOS proj" >> "$GITHUB_STEP_SUMMARY"
