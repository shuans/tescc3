name: Cocos Creator 3.8.8 iOS Export

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        type: boolean
        default: false

env:
  COCOS_DOWNLOAD_URL: "https://download.cocos.org/CocosCreator/v3.8.8/CocosCreator-v3.8.8-mac-010512.zip"
  TEMPLATE_REPO: "https://github.com/cocos/cocos-template-hello-world.git"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-export:
    name: "iOS Export + XCFramework (Cocos 3.8.8)"
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      - name: Cache Cocos Creator
        id: cache-cocos
        uses: actions/cache@v4
        with:
          path: ~/CocosCreator.app
          key: cocos-creator-3-8-8-${{ runner.os }}

      - name: Download & Install Cocos Creator 3.8.8
        if: steps.cache-cocos.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          COCOS_ZIP="/tmp/CocosCreator-3.8.8.zip"
          COCOS_EXTRACT="/tmp/CocosCreatorExtracted"
          COCOS_APP="$HOME/CocosCreator.app"

          if [ -d "$COCOS_APP" ]; then
            echo "Cocos Creator already exists"
            exit 0
          fi

          curl -L -o "$COCOS_ZIP" "${{ env.COCOS_DOWNLOAD_URL }}" \
            --retry 3 --retry-delay 5 --connect-timeout 30 --progress-bar

          test -s "$COCOS_ZIP"
          mkdir -p "$COCOS_EXTRACT"
          unzip -q "$COCOS_ZIP" -d "$COCOS_EXTRACT"
          cp -R "$COCOS_EXTRACT/CocosCreator.app" "$HOME/"

          test -x "$COCOS_APP/Contents/MacOS/CocosCreator"
          rm -rf "$COCOS_ZIP" "$COCOS_EXTRACT"

      - name: Verify Installation
        run: |
          set -euo pipefail
          COCOS_BIN="$HOME/CocosCreator.app/Contents/MacOS/CocosCreator"
          test -x "$COCOS_BIN"
          xcodebuild -version

      - name: Initialize Hello World Example Project
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ github.workspace }}/CocosExample"

          git clone --depth 1 "${{ env.TEMPLATE_REPO }}" "$PROJECT_DIR"
          rm -rf "$PROJECT_DIR/.git"

          PKG_JSON="$PROJECT_DIR/package.json"
          if [ -f "$PKG_JSON" ]; then
            python3 -c "import json; p='$PKG_JSON'; d=json.load(open(p)); d['version']='3.8.8'; json.dump(d, open(p,'w'), indent=2)"
          fi

      - name: Build for iOS
        id: build-ios
        run: |
          set -euo pipefail
          COCOS_BIN="$HOME/CocosCreator.app/Contents/MacOS/CocosCreator"
          PROJECT_DIR="${{ github.workspace }}/CocosExample"

          SCENE_META=$(find "$PROJECT_DIR/assets" -maxdepth 3 -name "*.scene.meta" | head -1)
          if [ -z "$SCENE_META" ]; then
            echo "No scene found"
            exit 1
          fi

          SCENE_UUID=$(python3 -c "import json; print(json.load(open('$SCENE_META'))['uuid'])")

          BUILD_CFG="${{ github.workspace }}/build-config.json"
          python3 -c "import json; cfg={'platform':'ios','buildPath':'${{ github.workspace }}/build','startScene':'$SCENE_UUID','scenes':[{'uuid':'$SCENE_UUID'}],'useDebug':False,'packages':{'ios':{'packageName':'com.cocos.example.ios'}}}; json.dump(cfg, open('$BUILD_CFG','w'), indent=2)"

          BUILD_ARGS="configPath=$BUILD_CFG"
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            BUILD_ARGS="${BUILD_ARGS};debug=true"
          fi

          BUILD_EXIT_CODE=0
          "$COCOS_BIN" --project "$PROJECT_DIR" --build "$BUILD_ARGS" 2>&1 || BUILD_EXIT_CODE=$?

          echo "exit_code=$BUILD_EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ "$BUILD_EXIT_CODE" -ne 0 ] && [ "$BUILD_EXIT_CODE" -ne 36 ]; then
            # 36: Cocos CLI may return this code on some successful iOS export flows; allow and continue.
            exit "$BUILD_EXIT_CODE"
          fi

      - name: Build Static Library + Create XCFramework
        run: |
          set -euo pipefail
          IOS_BUILD_DIR="${{ github.workspace }}/build/ios"
          PROJ_DIR="$IOS_BUILD_DIR/proj"
          XC_OUT="$IOS_BUILD_DIR/CocosEngine.xcframework"
          TMP_HEADERS="$RUNNER_TEMP/cocos-xc-headers"
          BUILD_ROOT="$RUNNER_TEMP/cocos-lib-build"
          DEVICE_OUT="$BUILD_ROOT/device"
          SIM_OUT="$BUILD_ROOT/simulator"
          LOG_DIR="$RUNNER_TEMP/cocos-xc-logs"
          mkdir -p "$TMP_HEADERS"
          mkdir -p "$LOG_DIR"
          mkdir -p "$DEVICE_OUT" "$SIM_OUT"

          # Prefer an existing xcframework generated by Cocos/engine scripts.
          EXISTING_XC=$(find "$IOS_BUILD_DIR" -name "*.xcframework" | head -1 || true)
          if [ -n "${EXISTING_XC:-}" ]; then
            rm -rf "$XC_OUT"
            cp -R "$EXISTING_XC" "$XC_OUT"
            echo "Reused existing xcframework: $EXISTING_XC"
            exit 0
          fi

          XCODEPROJ=$(find "$PROJ_DIR" -maxdepth 2 -name "*.xcodeproj" | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "Xcode project not found"
            exit 1
          fi

          PBXPROJ=$(find "$XCODEPROJ" -name "project.pbxproj" | head -1)
          if [ -z "$PBXPROJ" ]; then
            echo "project.pbxproj not found."
            exit 1
          fi

          PICKED_TARGET=$(awk '
            BEGIN { in_nt=0; name=""; pt=""; exact=""; fuzzy=""; all="" }
            /\/\* Begin PBXNativeTarget section \*\// { in_nt=1; next }
            /\/\* End PBXNativeTarget section \*\//   { in_nt=0 }
            !in_nt { next }
            {
              if ($0 ~ /name = /) {
                n=$0
                sub(/^.*name = /, "", n)
                sub(/;.*/, "", n)
                gsub(/"/, "", n)
                name=n
              }
              if ($0 ~ /productType = /) {
                p=$0
                sub(/^.*productType = /, "", p)
                sub(/;.*/, "", p)
                gsub(/"/, "", p)
                pt=p
                if (pt == "com.apple.product-type.library.static") {
                  l=tolower(name)
                  if (all == "") all=name; else all=all "," name
                  if (l == "cocos_engine") exact=name
                  else if (fuzzy == "" && l ~ /cocos.*engine|engine.*cocos/) fuzzy=name
                }
              }
            }
            END {
              if (exact != "") print exact
              else if (fuzzy != "") print fuzzy
              else print ""
            }
          ' "$PBXPROJ")
          if [ -z "${PICKED_TARGET:-}" ]; then
            echo "ERROR: No static cocos engine target found."
            echo "Static target candidates:"
            awk '
              BEGIN { in_nt=0; name="" }
              /\/\* Begin PBXNativeTarget section \*\// { in_nt=1; next }
              /\/\* End PBXNativeTarget section \*\//   { in_nt=0 }
              !in_nt { next }
              {
                if ($0 ~ /name = /) {
                  n=$0
                  sub(/^.*name = /, "", n)
                  sub(/;.*/, "", n)
                  gsub(/"/, "", n)
                  name=n
                }
                if ($0 ~ /productType = "com.apple.product-type.library.static"/) {
                  print "- " name
                }
              }
            ' "$PBXPROJ" | sort -u
            exit 1
          fi
          echo "Using static library target: $PICKED_TARGET"
          echo "Building iphoneos static lib..."
          if ! xcodebuild \
            -project "$XCODEPROJ" \
            -target "$PICKED_TARGET" \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$DEVICE_OUT" \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            IPHONEOS_DEPLOYMENT_TARGET=14.5 \
            CLANG_CXX_LANGUAGE_STANDARD=c++17 \
            CLANG_CXX_LIBRARY=libc++ \
            GCC_SYMBOLS_PRIVATE_EXTERN=YES \
            OTHER_CFLAGS="-fvisibility=hidden -fvisibility-inlines-hidden" \
            OTHER_CPLUSPLUSFLAGS="-fvisibility=hidden -fvisibility-inlines-hidden" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee "$LOG_DIR/build-${PICKED_TARGET// /_}-iphoneos.log"; then
            echo "Device static-library build failed for target: $PICKED_TARGET"
            tail -n 120 "$LOG_DIR/build-${PICKED_TARGET// /_}-iphoneos.log" || true
            exit 1
          fi

          echo "Building iphonesimulator static lib..."
          if ! xcodebuild \
            -project "$XCODEPROJ" \
            -target "$PICKED_TARGET" \
            -configuration Release \
            -sdk iphonesimulator \
            CONFIGURATION_BUILD_DIR="$SIM_OUT" \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            IPHONEOS_DEPLOYMENT_TARGET=14.5 \
            ARCHS="arm64 x86_64" \
            CLANG_CXX_LANGUAGE_STANDARD=c++17 \
            CLANG_CXX_LIBRARY=libc++ \
            GCC_SYMBOLS_PRIVATE_EXTERN=YES \
            OTHER_CFLAGS="-fvisibility=hidden -fvisibility-inlines-hidden" \
            OTHER_CPLUSPLUSFLAGS="-fvisibility=hidden -fvisibility-inlines-hidden" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee "$LOG_DIR/build-${PICKED_TARGET// /_}-iphonesimulator.log"; then
            echo "Simulator static-library build failed for target: $PICKED_TARGET"
            tail -n 120 "$LOG_DIR/build-${PICKED_TARGET// /_}-iphonesimulator.log" || true
            exit 1
          fi

          DEVICE_A="$DEVICE_OUT/libcocos_engine.a"
          SIM_A="$SIM_OUT/libcocos_engine.a"

          echo "Checking expected outputs:"
          ls -la "$DEVICE_OUT" || true
          ls -la "$SIM_OUT" || true

          if [ ! -f "$DEVICE_A" ]; then
            DEVICE_A=$(find "$DEVICE_OUT" -name "libcocos_engine.a" | head -1 || true)
          fi
          if [ -z "${DEVICE_A:-}" ]; then
            echo "No device libcocos_engine.a generated for target: $PICKED_TARGET at $DEVICE_OUT"
            echo "Debug list (cocos static libs):"
            find "$BUILD_ROOT" -name "lib*cocos*.a" 2>/dev/null | head -50 || true
            exit 1
          fi

          if [ ! -f "$SIM_A" ]; then
            SIM_A=$(find "$SIM_OUT" -name "libcocos_engine.a" | head -1 || true)
          fi

          if [ -n "${SIM_A:-}" ]; then
            DIST_DIR="$IOS_BUILD_DIR/dist"
            mkdir -p "$DIST_DIR"
            cp -f "$DEVICE_A" "$DIST_DIR/libCocosEngine_phone.a"
            cp -f "$SIM_A" "$DIST_DIR/libCocosEngine_simulator.a"
            rm -rf "$XC_OUT"
            xcodebuild -create-xcframework \
              -library "$DIST_DIR/libCocosEngine_phone.a" -headers "$TMP_HEADERS" \
              -library "$DIST_DIR/libCocosEngine_simulator.a" -headers "$TMP_HEADERS" \
              -output "$XC_OUT"
            echo "Created xcframework from target: $PICKED_TARGET"
            echo "Device lib: $DEVICE_A"
            echo "Simulator lib: $SIM_A"
          else
            echo "No simulator libcocos_engine.a found to pair with device lib."
            echo "Debug list (simulator cocos static libs):"
            find "$SIM_OUT" -name "lib*cocos*.a" 2>/dev/null | head -50 || true
            exit 1
          fi

      - name: Package Runtime Assets
        run: |
          set -euo pipefail
          OUT_DIR="${{ github.workspace }}/build/cocos-runtime"
          HOST_DIR="$OUT_DIR/host-template"
          mkdir -p "$OUT_DIR"
          mkdir -p "$HOST_DIR"

          copy_required_dir() {
            local name="$1"
            shift
            local found=""
            for cand in "$@"; do
              if [ -d "$cand" ]; then
                cp -R "$cand" "$OUT_DIR/$name"
                found="1"
                echo "Packed $name from: $cand"
                break
              fi
            done
            if [ -z "$found" ]; then
              echo "ERROR: required runtime dir '$name' not found."
              echo "Searched:"
              for cand in "$@"; do echo "  - $cand"; done
              exit 1
            fi
          }

          copy_required_dir "assets" \
            "${{ github.workspace }}/build/assets" \
            "${{ github.workspace }}/build/ios/assets" \
            "${{ github.workspace }}/build/ios/data/assets"

          copy_required_dir "src" \
            "${{ github.workspace }}/build/src" \
            "${{ github.workspace }}/build/ios/src" \
            "${{ github.workspace }}/build/ios/data/src"

          copy_required_dir "jsb-adapter" \
            "${{ github.workspace }}/build/jsb-adapter" \
            "${{ github.workspace }}/build/ios/jsb-adapter" \
            "${{ github.workspace }}/build/ios/data/jsb-adapter"

          if [ -d "${{ github.workspace }}/build/ios/CocosEngine.xcframework" ]; then
            cp -R "${{ github.workspace }}/build/ios/CocosEngine.xcframework" "$OUT_DIR/"
          else
            echo "ERROR: CocosEngine.xcframework not found."
            exit 1
          fi

          # Hard validation: must include both device and simulator slices.
          if [ ! -f "$OUT_DIR/CocosEngine.xcframework/Info.plist" ]; then
            echo "ERROR: XCFramework Info.plist missing."
            exit 1
          fi
          if ! find "$OUT_DIR/CocosEngine.xcframework/ios-arm64" -type f | grep -q .; then
            echo "ERROR: XCFramework missing ios-arm64 device slice."
            find "$OUT_DIR/CocosEngine.xcframework" -maxdepth 3 -type f | sort
            exit 1
          fi
          if ! find "$OUT_DIR/CocosEngine.xcframework" -maxdepth 2 -type d | grep -Eq "/ios-arm64_[^/]*simulator$|/ios-arm64_x86_64-simulator$|/ios-x86_64-simulator$"; then
            echo "ERROR: XCFramework missing simulator slice."
            find "$OUT_DIR/CocosEngine.xcframework" -maxdepth 3 -type f | sort
            exit 1
          fi
          for d in assets src jsb-adapter; do
            if [ ! -d "$OUT_DIR/$d" ]; then
              echo "ERROR: runtime dir missing in package: $d"
              find "$OUT_DIR" -maxdepth 3 | sort
              exit 1
            fi
          done

          APP_DIR="$HOST_DIR/CocosHostApp"
          mkdir -p "$APP_DIR/Sources" "$APP_DIR/Resources"

          cat > "$APP_DIR/project.yml" <<'YAML'
          name: CocosHostApp
          options:
            bundleIdPrefix: com.example
            deploymentTarget:
              iOS: "14.5"
          targets:
            CocosHostApp:
              type: application
              platform: iOS
              sources:
                - Sources
              resources:
                - path: ../../assets
                  optional: false
                - path: ../../src
                  optional: false
                - path: ../../jsb-adapter
                  optional: false
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.example.cocoshost
                  INFOPLIST_FILE: Resources/Info.plist
                  SWIFT_VERSION: "5.9"
                  IPHONEOS_DEPLOYMENT_TARGET: "14.5"
              dependencies:
                - framework: ../../CocosEngine.xcframework
              postBuildScripts:
                - name: Validate Runtime Resources
                  script: |
                    test -d "${SRCROOT}/../assets"
                    test -d "${SRCROOT}/../src"
                    test -d "${SRCROOT}/../jsb-adapter"
          YAML

          cat > "$APP_DIR/Resources/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>$(DEVELOPMENT_LANGUAGE)</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
                  <key>UISceneConfigurations</key>
                  <dict>
                      <key>UIWindowSceneSessionRoleApplication</key>
                      <array>
                          <dict>
                              <key>UISceneConfigurationName</key>
                              <string>Default Configuration</string>
                              <key>UISceneDelegateClassName</key>
                              <string>$(PRODUCT_MODULE_NAME).SceneDelegate</string>
                          </dict>
                      </array>
                  </dict>
              </dict>
          </dict>
          </plist>
          PLIST

          cat > "$APP_DIR/Sources/AppDelegate.swift" <<'SWIFT'
          import UIKit

          @main
          final class AppDelegate: UIResponder, UIApplicationDelegate {
              func application(
                  _ application: UIApplication,
                  didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]? = nil
              ) -> Bool {
                  true
              }
          }
          SWIFT

          cat > "$APP_DIR/Sources/SceneDelegate.swift" <<'SWIFT'
          import UIKit

          final class SceneDelegate: UIResponder, UIWindowSceneDelegate {
              var window: UIWindow?

              func scene(
                  _ scene: UIScene,
                  willConnectTo session: UISceneSession,
                  options connectionOptions: UIScene.ConnectionOptions
              ) {
                  guard let winScene = scene as? UIWindowScene else { return }
                  let win = UIWindow(windowScene: winScene)
                  win.rootViewController = UINavigationController(rootViewController: ViewController())
                  self.window = win
                  win.makeKeyAndVisible()
              }
          }
          SWIFT

          cat > "$APP_DIR/Sources/ViewController.swift" <<'SWIFT'
          import UIKit

          final class ViewController: UIViewController {
              private let gameContainer = UIView()

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .systemBackground
                  title = "Cocos Host"

                  gameContainer.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(gameContainer)
                  NSLayoutConstraint.activate([
                      gameContainer.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      gameContainer.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      gameContainer.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
                      gameContainer.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])

                  CocosRuntimeHost.shared.start()
                  CocosRuntimeHost.shared.attach(to: gameContainer)
              }

              deinit {
                  CocosRuntimeHost.shared.destroy()
              }
          }
          SWIFT

          cat > "$APP_DIR/Sources/CocosRuntimeHost.swift" <<'SWIFT'
          import UIKit

          // Minimal runtime host lifecycle. Validates packaged resources and mounts a runtime container view.
          final class CocosRuntimeHost {
              static let shared = CocosRuntimeHost()
              private enum State {
                  case idle
                  case started
                  case attached
              }
              private var state: State = .idle
              private weak var mountedView: UIView?
              private init() {}

              func start() {
                  guard state == .idle else { return }
                  precondition(resourceURL(for: "assets") != nil, "Missing bundled assets directory")
                  precondition(resourceURL(for: "src") != nil, "Missing bundled src directory")
                  precondition(resourceURL(for: "jsb-adapter") != nil, "Missing bundled jsb-adapter directory")
                  state = .started
              }

              func attach(to container: UIView) {
                  guard state == .started || state == .attached else { return }
                  if let mountedView {
                      mountedView.removeFromSuperview()
                  }
                  let runtimeView = UIView(frame: container.bounds)
                  runtimeView.translatesAutoresizingMaskIntoConstraints = false
                  runtimeView.backgroundColor = .black
                  container.addSubview(runtimeView)
                  NSLayoutConstraint.activate([
                      runtimeView.leadingAnchor.constraint(equalTo: container.leadingAnchor),
                      runtimeView.trailingAnchor.constraint(equalTo: container.trailingAnchor),
                      runtimeView.topAnchor.constraint(equalTo: container.topAnchor),
                      runtimeView.bottomAnchor.constraint(equalTo: container.bottomAnchor),
                  ])
                  mountedView = runtimeView
                  state = .attached
              }

              func destroy() {
                  mountedView?.removeFromSuperview()
                  mountedView = nil
                  state = .idle
              }

              private func resourceURL(for name: String) -> URL? {
                  let base = Bundle.main.resourceURL
                  let url = base?.appendingPathComponent(name, isDirectory: true)
                  guard let url else { return nil }
                  var isDir: ObjCBool = false
                  if FileManager.default.fileExists(atPath: url.path, isDirectory: &isDir), isDir.boolValue {
                      return url
                  }
                  return nil
              }
          }
          SWIFT

          cat > "$APP_DIR/generate_project.sh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            echo "xcodegen not found. Install with: brew install xcodegen"
            exit 1
          fi
          xcodegen generate --spec project.yml
          echo "Generated: CocosHostApp.xcodeproj"
          SH
          chmod +x "$APP_DIR/generate_project.sh"

          cat > "$HOST_DIR/README.md" <<'MD'
          # Swift Host Base Project (SDK Mode)

          This template is for: `CocosEngine.xcframework + assets/src/jsb-adapter`.

          1. Open `CocosHostApp.xcodeproj` directly (generated in CI).
          2. Keep `CocosEngine.xcframework` + `assets` + `src` + `jsb-adapter` as siblings of `CocosHostApp/`.
          3. Runtime resources are already wired into the app target by `project.yml`.
          4. Build and run the iOS app from Xcode.
          MD

      - name: Generate Host Xcode Project In CI
        run: |
          set -euo pipefail
          APP_DIR="${{ github.workspace }}/build/cocos-runtime/host-template/CocosHostApp"
          if [ ! -d "$APP_DIR" ]; then
            echo "ERROR: host app directory not found: $APP_DIR"
            exit 1
          fi
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          (cd "$APP_DIR" && xcodegen generate --spec project.yml)
          test -d "$APP_DIR/CocosHostApp.xcodeproj"

      - name: Validate Host Xcode Build
        run: |
          set -euo pipefail
          APP_DIR="${{ github.workspace }}/build/cocos-runtime/host-template/CocosHostApp"
          xcodebuild \
            -project "$APP_DIR/CocosHostApp.xcodeproj" \
            -scheme CocosHostApp \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Normalize Xcode Project Paths
        if: always()
        run: |
          set -euo pipefail
          PROJ_DIR="${{ github.workspace }}/build/ios/proj"
          XCODEPROJ=$(find "$PROJ_DIR" -maxdepth 2 -name "*.xcodeproj" | head -1 || true)
          if [ -z "${XCODEPROJ:-}" ]; then
            echo "No xcodeproj found, skip path normalization."
            exit 0
          fi

          PBXPROJ="$XCODEPROJ/project.pbxproj"
          if [ -f "$PBXPROJ" ]; then
            CI_BUILD_PREFIX="${{ github.workspace }}/build/ios/"
            CI_ROOT_PREFIX="${{ github.workspace }}/"
            sed -i '' "s|$CI_BUILD_PREFIX|../|g" "$PBXPROJ"
            sed -i '' "s|$CI_ROOT_PREFIX|../../|g" "$PBXPROJ"
            # Keep generated project aligned with C++17 requirement of Cocos 3.8.8 bindings.
            sed -i '' "s|CLANG_CXX_LANGUAGE_STANDARD = .*;|CLANG_CXX_LANGUAGE_STANDARD = c++17;|g" "$PBXPROJ"
            sed -i '' "s|CLANG_CXX_LIBRARY = .*;|CLANG_CXX_LIBRARY = libc++;|g" "$PBXPROJ"
          fi

          SCHEME_FILE=$(find "$XCODEPROJ/xcshareddata/xcschemes" -name "*.xcscheme" | head -1 || true)
          if [ -n "${SCHEME_FILE:-}" ] && [ -f "$SCHEME_FILE" ]; then
            CI_BUILD_PREFIX="${{ github.workspace }}/build/ios/proj/"
            sed -i '' "s|$CI_BUILD_PREFIX||g" "$SCHEME_FILE"
          fi

      - name: Build Portable iOS Project (No Local Cocos Required)
        if: always()
        run: |
          set -euo pipefail
          IOS_DIR="${{ github.workspace }}/build/ios"
          PROJ_DIR="$IOS_DIR/proj"
          XCODEPROJ=$(find "$PROJ_DIR" -maxdepth 2 -name "*.xcodeproj" | head -1 || true)
          PBXPROJ="${XCODEPROJ}/project.pbxproj"
          COCOS_NATIVE_SRC="$HOME/CocosCreator.app/Contents/Resources/resources/3d/engine/native"
          PORTABLE_ROOT="$IOS_DIR/portable-cocos"
          PORTABLE_NATIVE="$PORTABLE_ROOT/native"

          if [ -z "${XCODEPROJ:-}" ] || [ ! -f "$PBXPROJ" ]; then
            echo "No xcodeproj found, skip portable project packaging."
            exit 0
          fi
          if [ ! -d "$COCOS_NATIVE_SRC" ]; then
            echo "Cocos native source not found at $COCOS_NATIVE_SRC"
            exit 1
          fi

          mkdir -p "$PORTABLE_ROOT"
          rm -rf "$PORTABLE_NATIVE"
          cp -R "$COCOS_NATIVE_SRC" "$PORTABLE_NATIVE"

          # Rewrite absolute Cocos paths to packaged relative paths.
          sed -i '' "s|/Users/runner/CocosCreator.app/Contents/Resources/resources/3d/engine/native|../portable-cocos/native|g" "$PBXPROJ"
          sed -i '' "s|$HOME/CocosCreator.app/Contents/Resources/resources/3d/engine/native|../portable-cocos/native|g" "$PBXPROJ"

          # Rewrite CI workspace paths to project-relative paths.
          CI_BUILD_PREFIX="${{ github.workspace }}/build/ios/proj"
          sed -i '' "s|$CI_BUILD_PREFIX|.|g" "$PBXPROJ"
          sed -i '' "s|${{ github.workspace }}/CocosExample/native/engine/ios|../../CocosExample/native/engine/ios|g" "$PBXPROJ"

          # Scheme container portability.
          SCHEME_FILE=$(find "$XCODEPROJ/xcshareddata/xcschemes" -name "*.xcscheme" | head -1 || true)
          if [ -n "${SCHEME_FILE:-}" ] && [ -f "$SCHEME_FILE" ]; then
            sed -i '' "s|container:/Users/runner/work/[^/]*/[^/]*/build/ios/proj/|container:|g" "$SCHEME_FILE"
            sed -i '' "s|container:${{ github.workspace }}/build/ios/proj/|container:|g" "$SCHEME_FILE"
          fi

      - name: Inspect Build Output
        if: always()
        run: |
          BUILD_DIR="${{ github.workspace }}/build"
          if [ -d "$BUILD_DIR" ]; then
            find "$BUILD_DIR" -maxdepth 4 | sort
          else
            echo "build directory not found"
          fi

      - name: Upload iOS Runtime SDK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cocos-ios-runtime-sdk
          path: |
            build/cocos-runtime/
          if-no-files-found: warn
          compression-level: 6
          retention-days: 30

      - name: Upload Portable iOS Project Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cocos-ios-portable-project
          path: |
            build/ios/proj/
            build/ios/portable-cocos/
            build/assets/
            build/src/
            build/jsb-adapter/
          if-no-files-found: error
          compression-level: 6
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/.CocosCreator/logs/**
            ~/Library/Logs/CocosCreator/**
            ${{ runner.temp }}/cocos-xc-logs/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo "## iOS Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cocos Creator: 3.8.8" >> "$GITHUB_STEP_SUMMARY"
          echo "- Output artifact: cocos-ios-runtime-sdk" >> "$GITHUB_STEP_SUMMARY"
          echo "- Includes: CocosEngine.xcframework + assets/src/jsb-adapter" >> "$GITHUB_STEP_SUMMARY"
          echo "- Output artifact: cocos-ios-portable-project" >> "$GITHUB_STEP_SUMMARY"
          echo "- Includes: portable Xcode project + packaged native engine path + assets/src/jsb-adapter" >> "$GITHUB_STEP_SUMMARY"
